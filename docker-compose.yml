version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: carbon-trading-db
    environment:
      POSTGRES_USER: carbon
      POSTGRES_PASSWORD: carbon123
      POSTGRES_DB: carbon_trading
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
